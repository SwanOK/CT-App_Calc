<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jugaad Engine | Rating Simulator</title>
    <style>
        /* Import elegant Serif and clean Sans-Serif fonts */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Inter:wght@300;400;600&family=Fira+Code:wght@400;600&display=swap');

        :root {
            --bg-color: #0a0a0a; /* Deep premium black */
            --bg-panel: #141414; /* Slightly lighter for contrast */
            --text-main: #f4f4f4; /* Crisp white */
            --text-muted: #888888; /* Elegant gray */
            --accent-gold: #d4af37; /* Premium Gold */
            --accent-green: #4ade80;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Split Screen Layout */
        .image-panel {
            flex: 0 0 45%;
            background-image: url('https://images.pexels.com/photos/13395142/pexels-photo-13395142.jpeg?cs=tinysrgb&dpr=1&w=500');
            background-size: cover;
            background-position: center;
            border-right: 1px solid #222;
            position: relative;
        }

        /* Subtle dark gradient overlay on the image */
        .image-panel::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.1), rgba(10,10,10,0.9));
        }

        .content-panel {
            flex: 1;
            padding: 60px 80px;
            overflow-y: auto;
            background-color: var(--bg-color);
        }

        /* Custom Scrollbar for the right panel */
        .content-panel::-webkit-scrollbar { width: 6px; }
        .content-panel::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            letter-spacing: -1px;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 50px;
            display: flex;
            align-items: center;
        }

        .subtitle::before {
            content: '';
            display: inline-block;
            width: 30px;
            height: 2px;
            background-color: var(--accent-gold);
            margin-right: 15px;
        }

        .grid-section {
            margin-bottom: 50px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--text-main);
            margin-bottom: 25px;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input, select {
            background: transparent;
            border: none;
            border-bottom: 1px solid #444;
            color: var(--text-main);
            font-family: 'Fira Code', monospace;
            font-size: 1.1rem;
            padding: 8px 0;
            outline: none;
            transition: border-color 0.3s ease, color 0.3s ease;
        }

        input:focus, select:focus {
            border-bottom-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        /* Dropdown styling for dark mode */
        select option {
            background-color: var(--bg-panel);
            color: var(--text-main);
        }

        button {
            background-color: transparent;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            padding: 18px 40px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        button:hover {
            background-color: var(--accent-gold);
            color: var(--bg-color);
        }

        /* Results Dashboard */
        #results-dashboard {
            display: none;
            margin-top: 60px;
            padding-top: 50px;
            border-top: 1px solid #222;
        }

        .hero-metrics {
            display: grid;
            /* Widened the minimum box size from 120px to 180px */
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 20px;
            margin-bottom: 40px;
        }

        .metric-box {
            background: var(--bg-panel);
            padding: 25px 20px;
            border-left: 3px solid var(--accent-gold);
            overflow: hidden; /* Prevents any future text from spilling out */
        }

        .metric-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            white-space: nowrap; /* Keeps the label cleanly on one line */
        }

        .metric-value {
            /* Dynamically scales the font down if the screen gets too small */
            font-size: clamp(1.3rem, 2.5vw, 1.8rem); 
            font-family: 'Fira Code', monospace;
            color: var(--text-main);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th {
            text-align: left;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.7rem;
            border-bottom: 1px solid #333;
            padding-bottom: 12px;
        }

        td {
            padding: 12px 0;
            border-bottom: 1px solid #222;
            color: var(--text-main);
        }

        .val-right {
            text-align: right;
            font-family: 'Fira Code', monospace;
            color: var(--accent-gold);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            body { flex-direction: column; overflow: auto; }
            .image-panel { height: 300px; flex: none; border-right: none; border-bottom: 1px solid #222; }
            .content-panel { padding: 40px; overflow-y: visible; }
            .tables-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="image-panel"></div>
    
    <div class="content-panel">
        <h1>JUGAAD Engine</h1>
        <div class="subtitle">Thermodynamic Rating Platform</div>

        <div class="grid-section">
            <div class="section-title">Thermal Conditions</div>
            <div class="input-grid">
                <div class="input-group"><label>Total Water Flow (gpm)</label><input type="number" id="gpm" value="1149.9" step="0.1"></div>
                <div class="input-group"><label>Hot Water Temp (F)</label><input type="number" id="hw" value="97.5" step="0.1"></div>
                <div class="input-group"><label>Cold Water Temp (F)</label><input type="number" id="cw" value="90.0" step="0.1"></div>
                <div class="input-group"><label>Wet Bulb Temp (F)</label><input type="number" id="wb" value="83.0" step="0.1"></div>
                <div class="input-group"><label>Relative Humidity (%)</label><input type="number" id="rh" value="50.0" step="0.1"></div>
                <div class="input-group"><label>Site Altitude (ft)</label><input type="number" id="altitude" value="0.0" step="1"></div>
                <div class="input-group"><label>Motor Power / Cell (HP)</label><input type="number" id="fan_hp" value="10.0" step="0.1"></div>
            </div>
        </div>

        <div class="grid-section">
            <div class="section-title">Tower Geometry</div>
            <div class="input-grid">
                <div class="input-group"><label>No. of Cells</label><input type="number" id="cells" value="2"></div>
                <div class="input-group"><label>Cell Width (ft)</label><input type="number" id="cell_width_ft" value="10.0" step="0.1"></div>
                <div class="input-group"><label>Cell Length (ft)</label><input type="number" id="cell_length_ft" value="9.0" step="0.1"></div>
                <div class="input-group"><label>Inlet Height (ft)</label><input type="number" id="inlet_height_ft" value="4.0" step="0.1"></div>
                <div class="input-group"><label>Inlet Obstruction (%)</label><input type="number" id="inlet_obstruction_percent" value="5.0" step="0.1"></div>
                <div class="input-group"><label>Louver Coefficient</label><input type="number" id="louver_coeff" value="1.0" step="0.1"></div>
            </div>
        </div>

        <div class="grid-section">
            <div class="section-title">Fill Section</div>
            <div class="input-grid">
                <div class="input-group">
                    <label>Fill Type</label>
                    <select id="fill_type">
                        <option value="CF-1200">CF-1200</option>
                        <option value="CF-1900">CF-1900</option>
                    </select>
                </div>
                <div class="input-group"><label>Fill Height (ft)</label><input type="number" id="fill_height_ft" value="1.96" step="0.01"></div>
                <div class="input-group"><label>Fill Obstruction (%)</label><input type="number" id="fill_obstruction_percent" value="5.0" step="0.1"></div>
                <div class="input-group"><label>KaV/L Derate (%)</label><input type="number" id="kavl_derate" value="5.0" step="0.1"></div>
            </div>
        </div>

        <div class="grid-section">
            <div class="section-title">Plenum & Fan</div>
            <div class="input-grid">
                <div class="input-group"><label>Fan Diameter (ft)</label><input type="number" id="fan_diameter_ft" value="6.0" step="0.1"></div>
                <div class="input-group"><label>Hub Diameter (ft)</label><input type="number" id="hub_diameter_ft" value="1.26" step="0.01"></div>
                <div class="input-group"><label>Fan Inlet Loss Coeff.</label><input type="number" id="fan_inlet_coeff" value="0.50" step="0.1"></div>
            </div>
        </div>

        <button id="runBtn" onclick="runSimulation()">Execute Simulation</button>

        <div id="results-dashboard">
            <div class="section-title">Performance Metrics</div>
            <div class="hero-metrics">
                <div class="metric-box">
                    <div class="metric-label">Capability</div>
                    <div class="metric-value cap-gold" id="res-cap">--%</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">Operating L/G</div>
                    <div class="metric-value" id="res-lg">--</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">Adjusted L/G</div>
                    <div class="metric-value" id="res-lg-adj">--</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">Airflow (CFM)</div>
                    <div class="metric-value" id="res-cfm">--</div>
                </div>
            </div>

            <div class="tables-container">
                <div>
                    <div class="metric-label">KaV/L Data Breakdown</div>
                    <table>
                        <tbody id="kavl-table">
                            </tbody>
                    </table>
                </div>
                <div>
                    <div class="metric-label">System Pressure Drop</div>
                    <table>
                        <thead>
                            <tr>
                                <th>Section</th>
                                <th style="text-align:right">Vel (fpm)</th>
                                <th style="text-align:right">dP (in.wg)</th>
                            </tr>
                        </thead>
                        <tbody id="dp-table">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function runSimulation() {
            const btn = document.getElementById('runBtn');
            btn.innerText = "Processing...";
            
            const payload = {
                gpm: parseFloat(document.getElementById('gpm').value),
                hw: parseFloat(document.getElementById('hw').value),
                cw: parseFloat(document.getElementById('cw').value),
                wb: parseFloat(document.getElementById('wb').value),
                rh: parseFloat(document.getElementById('rh').value),
                altitude: parseFloat(document.getElementById('altitude').value),
                fan_hp: parseFloat(document.getElementById('fan_hp').value),
                cells: parseInt(document.getElementById('cells').value),
                cell_width_ft: parseFloat(document.getElementById('cell_width_ft').value),
                cell_length_ft: parseFloat(document.getElementById('cell_length_ft').value),
                inlet_height_ft: parseFloat(document.getElementById('inlet_height_ft').value),
                inlet_obstruction_percent: parseFloat(document.getElementById('inlet_obstruction_percent').value),
                louver_coeff: parseFloat(document.getElementById('louver_coeff').value),
                fill_type: document.getElementById('fill_type').value,
                fill_height_ft: parseFloat(document.getElementById('fill_height_ft').value),
                fill_obstruction_percent: parseFloat(document.getElementById('fill_obstruction_percent').value),
                kavl_derate: parseFloat(document.getElementById('kavl_derate').value),
                fan_diameter_ft: parseFloat(document.getElementById('fan_diameter_ft').value),
                hub_diameter_ft: parseFloat(document.getElementById('hub_diameter_ft').value),
                fan_inlet_coeff: parseFloat(document.getElementById('fan_inlet_coeff').value)
            };

            try {
                const response = await fetch('http://127.0.0.1:8000/simulate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("Server Error");
                const data = await response.json();

                document.getElementById('results-dashboard').style.display = 'block';
                
                // Scroll down to results smoothly
                setTimeout(() => {
                    document.getElementById('results-dashboard').scrollIntoView({ behavior: 'smooth' });
                }, 100);
                
                document.getElementById('res-cap').innerText = data.metrics.capability.toFixed(1) + '%';
                document.getElementById('res-lg').innerText = data.metrics.oper_lg.toFixed(4);
                document.getElementById('res-lg-adj').innerText = data.metrics.adj_lg.toFixed(4);
                document.getElementById('res-cfm').innerText = data.metrics.cfm.toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1});

                const th = data.thermal;
                let kavlHtml = `
                    <tr><td>Spray Zone</td><td class="val-right">${th.spray_kavl.toFixed(4)}</td></tr>
                    <tr><td style="color:#fff">Fill (${payload.fill_type})</td><td class="val-right">${th.fill_kavl.toFixed(4)}</td></tr>
                    <tr><td>Rain Zone</td><td class="val-right">${th.rain_kavl.toFixed(4)}</td></tr>
                    <tr><td>Total Available</td><td class="val-right">${th.total_available_kavl.toFixed(4)}</td></tr>
                    <tr><td>Derate (%)</td><td class="val-right">${payload.kavl_derate.toFixed(1)}</td></tr>
                `;
                if (th.hwt_corr_applied > 0) {
                    kavlHtml += `<tr><td style="color:#ff4d4d">HWT Correction (%)</td><td class="val-right" style="color:#ff4d4d">${th.hwt_corr_applied.toFixed(2)}</td></tr>`;
                }
                kavlHtml += `<tr><td style="color:var(--accent-gold)">KaV/L Adjusted</td><td class="val-right" style="color:var(--accent-gold); font-weight:bold">${th.kavl_adjusted.toFixed(4)}</td></tr>`;
                document.getElementById('kavl-table').innerHTML = kavlHtml;

                const ar = data.aero;
                let dpHtml = '';
                for (const [section, metrics] of Object.entries(ar)) {
                    if (section === "Total Static dP" || section === "Operating CFM") continue;
                    dpHtml += `<tr>
                        <td>${section}</td>
                        <td class="val-right" style="color:var(--text-main)">${metrics.vel.toFixed(1)}</td>
                        <td class="val-right">${metrics.dp.toFixed(4)}</td>
                    </tr>`;
                }
                dpHtml += `<tr><td style="color:var(--accent-gold)">Sum Static dP</td><td></td><td class="val-right" style="color:var(--accent-gold); font-weight:bold">${ar["Total Static dP"].toFixed(4)}</td></tr>`;
                document.getElementById('dp-table').innerHTML = dpHtml;

            } catch (error) {
                alert("Connection failed! Make sure your FastAPI backend is running.");
            } finally {
                btn.innerText = "Execute Simulation";
            }
        }
    </script>
</body>
</html>
